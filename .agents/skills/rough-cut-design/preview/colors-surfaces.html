<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="card" style="padding: 22px 24px;">
  <p class="eyebrow">Surfaces · paper (warm) vs canvas (cool) — both feel white</p>
  <div style="margin-top: 14px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div class="swatch">
      <div class="swatch-chip" style="background: #FAF9F5;"></div>
      <span class="swatch-name">paper</span>
      <span class="swatch-hex">#FAF9F5 · transcript</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #FFFFFE; border-color: #E5E2D5;"></div>
      <span class="swatch-name">paper-2</span>
      <span class="swatch-hex">#FFFFFE · the page</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #F3F3F0;"></div>
      <span class="swatch-name">canvas</span>
      <span class="swatch-hex">#F3F3F0 · chrome</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #FFFFFF; border-color: #E5E4DE;"></div>
      <span class="swatch-name">canvas-2</span>
      <span class="swatch-hex">#FFFFFF · popovers</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #0F0E0C; border-color: #0F0E0C;"></div>
      <span class="swatch-name">frame</span>
      <span class="swatch-hex">#0F0E0C · video</span>
    </div>
  </div>

  <!-- side-by-side feel test -->
  <div style="margin-top: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid #E5E4DE; border-radius: 2px; overflow: hidden;">
    <div style="background: #FAF9F5; padding: 16px 18px; border-right: 1px solid #E5E2D5;">
      <div style="font-family: 'Newsreader', Georgia, serif; font-size: 15px; color: #16161A; line-height: 1.55;">
        The transcript sits on <em style="font-style: italic;">paper</em>.
      </div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; color: #8B8678; margin-top: 6px;">paper · #FAF9F5</div>
    </div>
    <div style="background: #F3F3F0; padding: 16px 18px;">
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #16161A;">
        chrome sits on canvas.
      </div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; color: #8B8678; margin-top: 6px;">canvas · #F3F3F0</div>
    </div>
  </div>
</div>
</body></html>
