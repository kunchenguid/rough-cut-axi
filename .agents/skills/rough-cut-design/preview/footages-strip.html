<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<style>
  .ftg {
    background: var(--canvas-2); border: 1px solid var(--line-strong);
    border-radius: 2px; padding: 0; flex-shrink: 0; width: 168px;
    font-family: var(--font-mono); text-align: left;
    display: flex; flex-direction: column;
  }
  .ftg.active { border-color: var(--vermillion); box-shadow: inset 0 -2px 0 var(--vermillion); }
  .ftg .thumb { height: 60px; position: relative; overflow: hidden; background: linear-gradient(135deg, #2a221a 0%, #1a1714 60%, #0a0908 100%); border-bottom: 1px solid var(--line-strong); }
  .ftg.active .thumb { border-bottom-color: var(--vermillion); }
  .ftg .ord { position: absolute; top: 6px; left: 8px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(251,247,235,0.7); }
  .ftg .dur { position: absolute; bottom: 6px; right: 8px; font-size: 10px; color: rgba(251,247,235,0.7); font-variant-numeric: tabular-nums; }
  .ftg .meta { padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
  .ftg .name { font-size: 12px; color: var(--ink); }
  .ftg .stats { font-size: 10px; color: var(--ink-3); display: flex; justify-content: space-between; }
  .arr { align-self: center; color: var(--ink-4); font-family: var(--font-mono); font-size: 12px; }
</style>
<div class="card" style="padding: 18px 24px;">
  <p class="eyebrow">Footages · 3 in cut · 00:40.1 &nbsp; <span style="color: var(--ink-4);">+ Add footage</span></p>

    <div class="ftg active">

        </svg>
      </div>
      <div class="meta">
        <span class="name">Interview, daylight</span>
