<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="card" style="padding: 28px 36px;">
  <p class="eyebrow">Wordmark · DM Serif Display italic + playhead cut</p>

  <!-- Primary lockup -->
  <div style="margin-top: 24px; display: flex; align-items: center; gap: 28px;">
    <div style="display: inline-flex; align-items: stretch; font-family: var(--font-display); font-style: italic; font-weight: 400; color: var(--ink); font-size: 78px; line-height: 1; letter-spacing: -0.035em; white-space: nowrap;">
      <span>rough</span>
      <span style="display: inline-block; position: relative; width: 18px; height: 78px; margin: 0 0 0 6px;">
        <svg viewBox="0 0 18 110" width="18" height="110" style="position: absolute; top: -10px; left: 0; overflow: visible;">
          <polygon points="2,2 16,2 9,12" fill="#C7361F"/>
          <line x1="9" y1="12" x2="9" y2="108" stroke="#C7361F" stroke-width="1.5" stroke-linecap="square"/>
        </svg>
      </span>
      <span>cut</span>
    </div>
    <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);">primary</span>
  </div>

  <!-- Small lockup -->
  <div style="margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 16px;">
    <div style="display: inline-flex; align-items: stretch; font-family: var(--font-display); font-style: italic; font-weight: 400; color: var(--ink); font-size: 26px; line-height: 1; letter-spacing: -0.03em; white-space: nowrap;">
      <span>rough</span>
      <span style="display: inline-block; position: relative; width: 8px; height: 26px; margin: 0 0 0 3px;">
        <svg viewBox="0 0 8 40" width="8" height="40" style="position: absolute; top: -4px; left: 0; overflow: visible;">
          <polygon points="1,1 7,1 4,5" fill="#C7361F"/>
          <line x1="4" y1="5" x2="4" y2="38" stroke="#C7361F" stroke-width="1.2" stroke-linecap="square"/>
        </svg>
      </span>
      <span>cut</span>
    </div>
    <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);">in chrome · 26px</span>
  </div>

  <p style="font-family: var(--font-body); font-size: 14px; line-height: 1.55; color: var(--ink-2); margin: 22px 0 0; max-width: 56ch;">
    The mark is a <em style="font-style: italic;">timeline playhead</em> — the cursor of every video editor — running between <em style="font-style: italic;">rough</em> and <em style="font-style: italic;">cut</em>. The product, in two glyphs: the word, and the place where the cut happens.
  </p>
</div>
</body></html>
