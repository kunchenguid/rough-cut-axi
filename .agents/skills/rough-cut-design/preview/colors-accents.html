<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>

    </div>
    <div>
      <div class="row" style="gap: 8px;">

      </div>
      <div style="margin-top: 10px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); line-height: 1.6;">
        <div><strong style="color: var(--ultramarine); font-weight: 600;">ultramarine</strong> · #1F3A7A</div>

      </div>
    </div>
  </div>
