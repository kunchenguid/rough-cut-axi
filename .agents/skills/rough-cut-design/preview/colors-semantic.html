<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="card" style="padding: 22px 24px;">
  <p class="eyebrow">Semantic · Status colors</p>
  <div style="margin-top: 14px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
    <div class="swatch">
      <div class="swatch-chip" style="background: #2F5D3A;"></div>
      <span class="swatch-name" style="color: #2F5D3A;">ok</span>
      <span class="swatch-hex">#2F5D3A · rendered</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #A8780E;"></div>
      <span class="swatch-name" style="color: #A8780E;">caution</span>
      <span class="swatch-hex">#A8780E · queued</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #9A2614;"></div>
      <span class="swatch-name" style="color: #9A2614;">danger</span>
      <span class="swatch-hex">#9A2614 · destructive</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #9A9587;"></div>
      <span class="swatch-name" style="color: #5A5750;">mute</span>
      <span class="swatch-hex">#9A9587 · skipped</span>
    </div>
  </div>
</div>
</body></html>
