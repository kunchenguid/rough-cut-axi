<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="card" style="padding: 22px 24px;">
  <p class="eyebrow">Spacing · 4-pixel grid</p>
  <div style="margin-top: 16px; display: flex; align-items: flex-end; gap: 14px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3);">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:4px;width:4px;background:var(--ink);"></div><span>1<br><span style="color:var(--ink-4);">4</span></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:8px;width:8px;background:var(--ink);"></div><span>2<br><span style="color:var(--ink-4);">8</span></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:12px;width:12px;background:var(--ink);"></div><span>3<br><span style="color:var(--ink-4);">12</span></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:16px;width:16px;background:var(--ink);"></div><span>4<br><span style="color:var(--ink-4);">16</span></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:20px;width:20px;background:var(--ink);"></div><span>5<br><span style="color:var(--ink-4);">20</span></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:24px;width:24px;background:var(--ink);"></div><span>6<br><span style="color:var(--ink-4);">24</span></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:32px;width:32px;background:var(--ink);"></div><span>7<br><span style="color:var(--ink-4);">32</span></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:40px;width:40px;background:var(--ink);"></div><span>8<br><span style="color:var(--ink-4);">40</span></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:48px;width:48px;background:var(--ink);"></div><span>9<br><span style="color:var(--ink-4);">48</span></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="height:64px;width:64px;background:var(--ink);"></div><span>10<br><span style="color:var(--ink-4);">64</span></span></div>
  </div>
  <p class="eyebrow" style="margin-top: 18px;">Panels = space-4 (16) · Buttons = 8/12 · Reading column = 64ch</p>
</div>
</body></html>
