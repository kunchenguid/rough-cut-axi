<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="card" style="padding: 22px 24px;">
  <p class="eyebrow">Cards · Paper / canvas / lifted</p>
  <div style="margin-top: 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;">
    <div style="background: var(--paper-2); border: 1px solid var(--line-paper); border-radius: 4px; padding: 14px;">
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3);">¶ note</div>
      <div style="font-family: var(--font-body); font-size: 14px; line-height: 1.55; color: var(--ink); margin-top: 6px;">Tighten the opening — too much hedging.</div>
    </div>
    <div style="background: var(--canvas); border: 1px solid var(--line); border-radius: 4px; padding: 14px;">
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3);">passage_3</div>
      <div style="font-family: var(--font-mono); font-size: 13px; color: var(--ink); margin-top: 6px;">00:12 → 00:18</div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 4px;">Selected from transcript.</div>
    </div>
    <div style="background: var(--canvas-2); border: 1px solid var(--line); border-radius: 4px; padding: 14px; box-shadow: 0 1px 0 rgba(22,22,26,0.04), 0 8px 24px -12px rgba(22,22,26,0.18);">
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3);">popover</div>
      <div style="font-family: var(--font-mono); font-size: 13px; color: var(--ink); margin-top: 6px;">Split at 00:14.20</div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 4px;">Snaps to word boundary.</div>
    </div>
  </div>
</div>
</body></html>
