<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_render-dialog.css"></head>
<body>
<div class="card-host">
  <div class="dlg">
    <div class="hd">
      <h2>Final render</h2>
      <span class="meta">00:40.1 · 3 footages</span>
    </div>

    <div class="field"><span class="fld-label">Frame rate</span>
      <div class="seg"><button>24</button><button class="on">30</button><button>60</button></div>
    </div>
    <div class="field"><span class="fld-label">Codec</span>
      <div class="seg"><button class="on">H.264</button><button>H.265</button><button>ProRes</button></div>
    </div>

    <div class="ft">
      <span class="info">~72 MB · ffmpeg, locally</span>
      <div class="actions">
        <button class="btn btn-quiet">Cancel</button>
        <button class="btn btn-primary">▶ Start render</button>
      </div>
    </div>
  </div>
</div>
</body></html>
