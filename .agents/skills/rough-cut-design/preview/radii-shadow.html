<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="card" style="padding: 22px 24px;">
  <p class="eyebrow">Radii · 0 / 2 / 4 / pill</p>
  <div style="margin-top: 14px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: end;">
    <div class="swatch"><div style="height:56px;background:var(--paper-2);border:1px solid var(--line-paper);border-radius:0;"></div><span class="swatch-name">radius-0</span><span class="swatch-hex">0px · chrome</span></div>
    <div class="swatch"><div style="height:56px;background:var(--paper-2);border:1px solid var(--line-paper);border-radius:2px;"></div><span class="swatch-name">radius-1</span><span class="swatch-hex">2px · buttons</span></div>
    <div class="swatch"><div style="height:56px;background:var(--paper-2);border:1px solid var(--line-paper);border-radius:4px;"></div><span class="swatch-name">radius-2</span><span class="swatch-hex">4px · cards</span></div>
    <div class="swatch"><div style="height:32px;width:88px;background:var(--paper-2);border:1px solid var(--line-paper);border-radius:999px;align-self:center;"></div><span class="swatch-name">radius-pill</span><span class="swatch-hex">999px · pills</span></div>
  </div>
  <p class="eyebrow" style="margin-top: 22px;">Shadow · 0 / 1 / 2</p>
  <div style="margin-top: 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: end;">
    <div class="swatch"><div style="height:56px;background:var(--canvas-2);border:1px solid var(--line);border-radius:4px;box-shadow:none;"></div><span class="swatch-name">shadow-0</span><span class="swatch-hex">none · 95% of UI</span></div>
    <div class="swatch"><div style="height:56px;background:var(--canvas-2);border:1px solid var(--line);border-radius:4px;box-shadow:0 1px 0 rgba(22,22,26,0.04),0 8px 24px -12px rgba(22,22,26,0.18);"></div><span class="swatch-name">shadow-1</span><span class="swatch-hex">popovers, dock</span></div>
    <div class="swatch"><div style="height:56px;background:var(--canvas-2);border:1px solid var(--line);border-radius:4px;box-shadow:0 24px 60px -24px rgba(22,22,26,0.28),0 1px 0 rgba(22,22,26,0.05);"></div><span class="swatch-name">shadow-2</span><span class="swatch-hex">modals only</span></div>
  </div>
</div>
</body></html>
