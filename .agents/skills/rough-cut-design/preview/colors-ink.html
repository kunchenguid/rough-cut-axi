<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="card" style="padding: 22px 24px;">
  <p class="eyebrow">Ink · Text & lines</p>
  <div style="margin-top: 14px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
    <div class="swatch">
      <div class="swatch-chip" style="background: #16161A;"></div>
      <span class="swatch-name">ink</span>
      <span class="swatch-hex">#16161A</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #5A5750;"></div>
      <span class="swatch-name">ink-2</span>
      <span class="swatch-hex">#5A5750</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #8B8678;"></div>
      <span class="swatch-name">ink-3</span>
      <span class="swatch-hex">#8B8678</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #B8B2A2;"></div>
      <span class="swatch-name">ink-4</span>
      <span class="swatch-hex">#B8B2A2</span>
    </div>
  </div>
  <div style="margin-top: 18px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
    <div class="swatch">
      <div class="swatch-chip" style="background: #F3F3F0; height: 28px; border-top: 1px solid #E5E4DE; border-bottom: 1px solid #E5E4DE; border-radius: 0; border-left:0; border-right:0;"></div>
      <span class="swatch-name">line</span>
      <span class="swatch-hex">#E5E4DE · on canvas</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #FAF9F5; height: 28px; border-top: 1px solid #E5E2D5; border-bottom: 1px solid #E5E2D5; border-radius: 0; border-left:0; border-right:0;"></div>
      <span class="swatch-name">line-paper</span>
      <span class="swatch-hex">#E5E2D5 · on paper</span>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background: #F3F3F0; height: 28px; border-top: 1px solid #CFCDC4; border-bottom: 1px solid #CFCDC4; border-radius: 0; border-left:0; border-right:0;"></div>
      <span class="swatch-name">line-strong</span>
      <span class="swatch-hex">#CFCDC4 · emphasised</span>
    </div>
  </div>
</div>
</body></html>
